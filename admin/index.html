<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager - Alquds Jewelry</title>
</head>

<body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
        // Automatic ID Generator for Alquds Jewelry Admin Panel (Ultra High Performance Edition)
        (function() {
            console.log("=== ALQUDS ADMIN ID AUTO-GENERATOR ACTIVE (OPTIMIZED) ===");

            // Category Prefix Mapping matching Alquds store categories
            const PREFIX_MAP = {
                'necklaces': 'NS',           // Necklace Sets
                'long-necklaces': 'LN',      // Long Necklaces
                'hand-chains': 'HC',         // Hand Chains / Kaffs
                'pins': 'Pn',                // Pins
                'christian-pendants': 'Cp',   // Christian Pendants
                'bangles': 'B',
                'bangle-sets': 'BS',
                'chains': 'Ch',
                'rings': 'R',
                'earrings': 'E',
                'bracelets': 'Br',
                'pendants': 'P',
                'frames': 'Fr',
                'anklets': 'A',
                'children': 'Kd',
                'kladas': 'Kc',
                'bands': 'Bd',
                'belts': 'Bt',
                'chokers': 'Ck',
                'name-plates': 'Np',
                'white-gold': 'Wg',
                'silver': 'S',
                'diamonds': 'D',
                'coins-bullions': 'Cb'
            };

            const jsonCache = {}; // In-memory JSON database cache

            function getCollectionFilename() {
                const hash = window.location.hash || '';
                if (hash.includes('white-gold')) return 'white-gold';
                if (hash.includes('silver')) return 'silver';
                
                const match = hash.match(/entries\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return match[1];
                }
                return '';
            }

            function isIdField(input) {
                let parent = input.parentElement;
                for (let i = 0; i < 4 && parent; i++) {
                    const label = parent.querySelector('label, span');
                    if (label && label.textContent.trim().toUpperCase() === 'ID') {
                        return true;
                    }
                    parent = parent.parentElement;
                }
                return false;
            }

            function findItemGroup(input) {
                let cur = input.parentElement;
                while (cur && cur.tagName !== 'FORM' && cur.tagName !== 'BODY') {
                    if (cur.querySelector('input') && cur.textContent.includes('Category')) {
                        return cur;
                    }
                    cur = cur.parentElement;
                }
                return document.body;
            }

            function getCategoryValue(container) {
                const selects = container.querySelectorAll('select, input');
                for (const el of selects) {
                    let parent = el.parentElement;
                    for (let i = 0; i < 4 && parent; i++) {
                        const lbl = parent.querySelector('label, span');
                        if (lbl && lbl.textContent.trim().toUpperCase() === 'CATEGORY') {
                            if (el.value) return el.value;
                        }
                        parent = parent.parentElement;
                    }
                }
                
                const text = container.textContent.toLowerCase();
                if (text.includes('necklace sets')) return 'necklaces';
                if (text.includes('long-necklaces') || text.includes('necklaces')) return 'long-necklaces';

                const categoriesList = [
                    'bangle-sets', 'bangles', 'hand-chains', 'chains', 
                    'christian-pendants', 'pendants', 'coins-bullions', 'white-gold', 
                    'name-plates', 'earrings', 'rings', 'bracelets', 'frames', 
                    'anklets', 'children', 'kladas', 'bands', 'belts', 'chokers', 
                    'pins', 'silver', 'diamonds'
                ];
                
                for (const cat of categoriesList) {
                    if (text.includes(cat)) return cat;
                }
                return null;
            }

            function getColorValue(container) {
                const selects = container.querySelectorAll('select, input');
                for (const el of selects) {
                    let parent = el.parentElement;
                    for (let i = 0; i < 4 && parent; i++) {
                        const lbl = parent.querySelector('label, span');
                        if (lbl && lbl.textContent.trim().toUpperCase() === 'COLOR / MATERIAL') {
                            if (el.value) return el.value;
                        }
                        parent = parent.parentElement;
                    }
                }
                const text = container.textContent.toLowerCase();
                if (text.includes('white gold')) return 'White Gold';
                if (text.includes('silver')) return 'Silver';
                return 'Yellow Gold';
            }

            function getMaterialPrefix(color) {
                if (!color) return '';
                const c = color.toLowerCase();
                if (c.includes('white gold')) return 'Wg';
                if (c.includes('silver')) return 'S';
                return '';
            }

            function fetchProductData(filename, callback) {
                if (!filename) {
                    callback([]);
                    return;
                }
                if (jsonCache[filename]) {
                    callback(jsonCache[filename]);
                    return;
                }
                fetch('../data/products/' + filename + '.json')
                    .then(r => r.ok ? r.json() : { products_list: [] })
                    .then(data => {
                        const list = data.products_list || [];
                        jsonCache[filename] = list;
                        callback(list);
                    })
                    .catch(() => {
                        jsonCache[filename] = [];
                        callback([]);
                    });
            }

            function autoGenerateIdForInput(idInput) {
                if (!idInput || document.activeElement === idInput) return;
                
                const container = findItemGroup(idInput);
                const category = getCategoryValue(container);
                const color = getColorValue(container);

                if (!category) return;

                const materialPrefix = getMaterialPrefix(color);
                const categoryPrefix = PREFIX_MAP[category] || '';
                const prefix = materialPrefix + categoryPrefix;
                
                let maxNum = 0;
                const allInputs = document.querySelectorAll('input');
                allInputs.forEach(inp => {
                    if (inp !== idInput && inp.value) {
                        const val = inp.value.trim();
                        if (val.toLowerCase().startsWith(prefix.toLowerCase())) {
                            const numStr = val.substring(prefix.length);
                            const num = parseInt(numStr, 10);
                            if (!isNaN(num) && num > maxNum) {
                                maxNum = num;
                            }
                        }
                    }
                });

                const filename = getCollectionFilename() || category;
                fetchProductData(filename, (products) => {
                    products.forEach(p => {
                        const idStr = String(p.id || '').trim();
                        if (idStr.toLowerCase().startsWith(prefix.toLowerCase())) {
                            const numStr = idStr.substring(prefix.length);
                            const num = parseInt(numStr, 10);
                            if (!isNaN(num) && num > maxNum) {
                                maxNum = num;
                            }
                        }
                    });

                    const nextNum = maxNum + 1;
                    const nextId = prefix + nextNum;
                    
                    const currentVal = idInput.value.trim();
                    const currentPrefix = currentVal.replace(/[0-9]/g, '');

                    if (!currentVal || currentPrefix.toLowerCase() !== prefix.toLowerCase()) {
                        const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                        if (setter) {
                            setter.call(idInput, nextId);
                        } else {
                            idInput.value = nextId;
                        }
                        idInput.dispatchEvent(new Event('input', { bubbles: true }));
                        idInput.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });
            }

            function scanAndAutoFill() {
                // Targeted fast scan over input elements only
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    // FAST PATH: Instantly skip filled or active inputs
                    if (document.activeElement === input) return;
                    
                    const val = input.value.trim();
                    if (!val) {
                        if (isIdField(input)) {
                            autoGenerateIdForInput(input);
                        }
                    }
                });
            }

            let scanTimeout;
            const observer = new MutationObserver(() => {
                clearTimeout(scanTimeout);
                scanTimeout = setTimeout(() => {
                    if (window.requestIdleCallback) {
                        requestIdleCallback(scanAndAutoFill);
                    } else {
                        setTimeout(scanAndAutoFill, 0);
                    }
                }, 500);
            });

            observer.observe(document.body, { childList: true, subtree: true });
        })();
    </script>
</body>

</html>
