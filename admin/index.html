<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager - Alquds Jewelry</title>
</head>

<body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
        // Automatic ID Generator for Alquds Jewelry Admin Panel (Stable v5 - Interval & Event Driven, No MutationObserver)
        (function() {
            console.log("=== ALQUDS ADMIN ID AUTO-GENERATOR ACTIVE (STABLE v5) ===");

            // Category Prefix Mapping matching Alquds store categories
            const PREFIX_MAP = {
                'necklaces': 'NS',           // Necklace Sets
                'long-necklaces': 'LN',      // Long Necklaces
                'hand-chains': 'HC',         // Hand Chains / Kaffs
                'pins': 'Pn',                // Pins
                'christian-pendants': 'Cp',   // Christian Pendants
                'bangles': 'B',
                'bangle-sets': 'BS',
                'chains': 'Ch',
                'rings': 'R',
                'earrings': 'E',
                'bracelets': 'Br',
                'pendants': 'P',
                'frames': 'Fr',
                'anklets': 'A',
                'children': 'Kd',
                'kladas': 'Kc',
                'bands': 'Bd',
                'belts': 'Bt',
                'chokers': 'Ck',
                'name-plates': 'Np',
                'white-gold': 'Wg',
                'silver': 'S',
                'diamonds': 'D',
                'coins-bullions': 'Cb'
            };

            const jsonCache = {};
            const activeAutofills = new Set(); // Prevent duplicate concurrent processing of same inputs

            function getCollectionFilename() {
                const hash = window.location.hash || '';
                if (hash.includes('white-gold')) return 'white-gold';
                if (hash.includes('silver')) return 'silver';
                const match = hash.match(/entries\/([a-zA-Z0-9_-]+)/);
                return (match && match[1]) ? match[1] : '';
            }

            function findFieldGroup(element) {
                let cur = element.parentElement;
                if (cur) cur = cur.parentElement;
                while (cur && cur.tagName !== 'FORM' && cur.tagName !== 'BODY') {
                    const text = cur.textContent.toUpperCase();
                    if (text.includes('ID') && text.includes('CATEGORY')) {
                        return cur;
                    }
                    cur = cur.parentElement;
                }
                return document.body;
            }

            function findInputForLabel(label) {
                let cur = label.parentElement;
                while (cur && cur.tagName !== 'FORM' && cur.tagName !== 'BODY') {
                    const inputs = cur.querySelectorAll('input, select, textarea');
                    if (inputs.length === 1) {
                        return inputs[0];
                    }
                    cur = cur.parentElement;
                }
                return null;
            }

            function getSelectedCategory(container) {
                const label = Array.from(container.querySelectorAll('label, span, div'))
                    .find(el => el.textContent.trim().toUpperCase() === 'CATEGORY');
                
                if (label) {
                    const control = findInputForLabel(label);
                    if (control && control.value) {
                        return control.value;
                    }
                    
                    const text = label.parentElement ? label.parentElement.textContent.toLowerCase() : '';
                    const valText = text.replace('category', '').trim();
                    
                    if (valText.includes('necklace sets')) return 'necklaces';
                    if (valText.includes('long-necklaces') || valText.includes('necklaces')) return 'long-necklaces';
                    
                    const categoriesList = [
                        'bangle-sets', 'bangles', 'hand-chains', 'chains', 
                        'christian-pendants', 'pendants', 'coins-bullions', 'white-gold', 
                        'name-plates', 'earrings', 'rings', 'bracelets', 'frames', 
                        'anklets', 'children', 'kladas', 'bands', 'belts', 'chokers', 
                        'pins', 'silver', 'diamonds'
                    ];
                    
                    for (const cat of categoriesList) {
                        if (valText.includes(cat)) return cat;
                    }
                }
                return null;
            }

            function getSelectedColor(container) {
                const label = Array.from(container.querySelectorAll('label, span, div'))
                    .find(el => el.textContent.trim().toUpperCase() === 'COLOR / MATERIAL');
                
                if (label) {
                    const control = findInputForLabel(label);
                    if (control && control.value) {
                        return control.value;
                    }
                    
                    const text = label.parentElement ? label.parentElement.textContent.toLowerCase() : '';
                    if (text.includes('white gold')) return 'White Gold';
                    if (text.includes('silver')) return 'Silver';
                    if (text.includes('yellow gold')) return 'Yellow Gold';
                }
                return 'Yellow Gold';
            }

            function getMaterialPrefix(color) {
                if (!color) return '';
                const c = color.toLowerCase();
                if (c.includes('white gold')) return 'Wg';
                if (c.includes('silver')) return 'S';
                return '';
            }

            function fetchProductData(filename, callback) {
                if (!filename) {
                    callback([]);
                    return;
                }
                if (jsonCache[filename]) {
                    callback(jsonCache[filename]);
                    return;
                }
                fetch('../data/products/' + filename + '.json')
                    .then(r => r.ok ? r.json() : { products_list: [] })
                    .then(data => {
                        const list = data.products_list || [];
                        jsonCache[filename] = list;
                        callback(list);
                    })
                    .catch(() => {
                        jsonCache[filename] = [];
                        callback([]);
                    });
            }

            function autoGenerateId(category, idInput, color) {
                if (!category || document.activeElement === idInput) return;
                
                if (activeAutofills.has(idInput)) return; // Lock this input
                activeAutofills.add(idInput);

                const materialPrefix = getMaterialPrefix(color);
                const categoryPrefix = PREFIX_MAP[category] || '';
                const prefix = materialPrefix + categoryPrefix;
                
                let maxNum = 0;
                
                // Scan loaded inputs on page
                const idLabels = Array.from(document.querySelectorAll('label, span, div'))
                    .filter(el => el.textContent.trim().toUpperCase() === 'ID');
                    
                idLabels.forEach(label => {
                    const input = findInputForLabel(label);
                    if (input && input !== idInput && input.value) {
                        const val = input.value.trim();
                        if (val.toLowerCase().startsWith(prefix.toLowerCase())) {
                            const numStr = val.substring(prefix.length);
                            const num = parseInt(numStr, 10);
                            if (!isNaN(num) && num > maxNum) maxNum = num;
                        }
                    }
                });

                // Fetch JSON data fallback
                const filename = getCollectionFilename() || category;
                fetchProductData(filename, (products) => {
                    products.forEach(p => {
                        const idStr = String(p.id || '').trim();
                        if (idStr.toLowerCase().startsWith(prefix.toLowerCase())) {
                            const numStr = idStr.substring(prefix.length);
                            const num = parseInt(numStr, 10);
                            if (!isNaN(num) && num > maxNum) {
                                maxNum = num;
                            }
                        }
                    });

                    applyNextId(prefix, maxNum, idInput);
                    activeAutofills.delete(idInput); // Unlock
                });
            }

            function applyNextId(prefix, maxNum, idInput) {
                if (document.activeElement === idInput) return;
                const nextNum = maxNum + 1;
                const nextId = prefix + nextNum;
                
                const currentVal = idInput.value.trim();
                const currentPrefix = currentVal.replace(/[0-9]/g, '');
                
                if (!currentVal || currentPrefix.toLowerCase() !== prefix.toLowerCase()) {
                    const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                    if (setter) {
                        setter.call(idInput, nextId);
                    } else {
                        idInput.value = nextId;
                    }
                    idInput.dispatchEvent(new Event('input', { bubbles: true }));
                    idInput.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }

            function scanAndAutoFill() {
                const labels = Array.from(document.querySelectorAll('label, span, div'))
                    .filter(el => el.textContent.trim().toUpperCase() === 'ID');
                    
                labels.forEach(label => {
                    const idInput = findInputForLabel(label);
                    
                    if (idInput && document.activeElement !== idInput && !activeAutofills.has(idInput)) {
                        const itemContainer = findFieldGroup(idInput);
                        if (itemContainer) {
                            const category = getSelectedCategory(itemContainer);
                            const color = getSelectedColor(itemContainer);
                            if (category) {
                                autoGenerateId(category, idInput, color);
                            }
                        }
                    }
                });
            }

            // 1. Low-frequency interval execution (once per second). 100% crash-free, extremely cheap (<0.2ms overhead).
            setInterval(scanAndAutoFill, 1000);

            // 2. Trigger instantly on Category/Color dropdown changes
            document.addEventListener('change', (e) => {
                if (e.target && e.target.tagName === 'SELECT') {
                    scanAndAutoFill();
                }
            });

            // 3. Trigger instantly on clicking "Add product" button
            document.addEventListener('click', (e) => {
                const text = e.target ? (e.target.textContent || '').toLowerCase() : '';
                if (text.includes('add') || text.includes('new')) {
                    setTimeout(scanAndAutoFill, 200);
                    setTimeout(scanAndAutoFill, 600);
                }
            });

            // Initial scan when page loads
            setTimeout(scanAndAutoFill, 1500);
        })();
    </script>
</body>

</html>
