name: Update Gold Price
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update-price:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    - name: Fetch and Update Price
      env:
        GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
      run: node update_price.js
    - name: Commit and Push Changes
      run: |
        git config --global user.name 'GoldPriceBot'
        git config --global user.email 'bot@alqudsjewelry.com'
        git add data/pricing.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update gold price [skip ci]" && git push)
